services:
    api:
        build: .
        container_name: nestjs_api
        env_file:
            - .env
        ports:
            - '3000:3000'
        networks:
            - app-network

    nginx:
        image: nginx:alpine
        container_name: nestjs_nginx
        ports:
            - '80:80'
            - '443:443'
        volumes:
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
            - /etc/letsencrypt:/etc/letsencrypt:ro
        depends_on:
            - api
        networks:
            - app-network

networks:
    app-network:
        driver: bridge
